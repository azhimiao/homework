matching:
  min_score: 2
  tie_threshold: 1
  keyword_weight: 2
  major_weight: 3

install:
  default_host: cursor
  default_scope: project
  cli_template: "python skill-core/skill.py install {skill} --host {host} --scope {scope} --project {project_dir} --force"
  resolve_order:
    - registry
    - examples/student-homework/{skill}
    - examples/coding-homework/{skill}
    - examples/simulation-lab/{skill}
    - examples/{skill}
    - skill-forge/built/simulation-lab/{skill}
    - skill-forge/built/coding-homework/{skill}
    - skill-forge/built/student-homework/{skill}
