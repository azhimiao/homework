version: "3.0"

majors:
  - id: cs
    aliases: [计算机, 计算机科学, 计算机科学与技术, 软件工程, CS, 计科, 计算机专业, 物联网, 嵌入式]
  - id: ee
    aliases: [电子信息, 电子信息工程, 电子, 通信工程, EE, 电信, 光电, 微电子]
  - id: auto
    aliases: [自动化, 电气工程及其自动化, 电气, 控制, 测控]
  - id: mech
    aliases: [机械, 机械工程, 机电, 车辆, 飞行器, 能源动力]
  - id: civil
    aliases: [土木, 建筑工程, 水利, 交通工程]
  - id: phys
    aliases: [物理, 应用物理, 数理]
  - id: chem
    aliases: [化学, 化工, 材料, 高分子, 应化]
  - id: math
    aliases: [数学, 统计学, 信计, 应用数学, 金融数学]
  - id: bio
    aliases: [生物, 生物医学, 生物工程, 生命科学]
  - id: stem
    aliases: [理工科, 工科, 理科, 工科大类]

assignments:
  - id: comp-org-quartus
    title: 计算机组成原理实验 / FPGA 数字逻辑实验
    status: ready
    majors: [cs, ee, auto]
    match_keywords:
      - 组成原理
      - 计组
      - 计算机组成
      - 数字逻辑
      - quartus
      - fpga
      - verilog
      - vhdl
      - altera
      - intel fpga
      - de10
      - de1
      - terasic
      - max10
      - cyclone
      - 引脚分配
      - 可编程逻辑
    skills_to_install:
      - name: quartus-lab
        scope: project
    default_board: DE10-Lite
    workspace_subdir: comp-org-lab
    deliverables:
      - Quartus 工程 (.qpf / .qsf)
      - 设计源文件 (.v / .vhd / .bdf)
      - 引脚分配文件或 Pin Planner 导出
      - 编译成功截图或 build-log
      - 仿真波形或 RTL 截图（若要求）
      - 实验报告（按学院模板）

  - id: vivado-fpga-lab
    title: Xilinx Vivado FPGA 实验
    status: planned
    majors: [cs, ee, auto]
    match_keywords: [vivado, xilinx, zynq, artix, kintex, 赛灵思, fpga实验]
    skills_to_install: []
    workspace_subdir: vivado-lab
    deliverables: [Verilog/VHDL, 约束 XDC, 综合实现 log, 报告]
    note: 见 universal-stem-workflow.md

  - id: python-coursework
    title: Python 程序设计作业
    status: ready
    majors: [cs, math, bio, stem]
    match_keywords: [python, 程序设计, 程设, pandas, numpy作业, 爬虫, py作业]
    skills_to_install:
      - name: python-lab
        scope: project
    workspace_subdir: python-homework
    deliverables: [源代码, requirements.txt, 运行截图, 报告]

  - id: java-oop-coursework
    title: Java 面向对象作业
    status: ready
    majors: [cs]
    match_keywords: [java, 面向对象, junit, maven, oop]
    skills_to_install:
      - name: java-oop-lab
        scope: project
    workspace_subdir: java-homework
    deliverables: [源码, JUnit, 编译截图, 报告]

  - id: ds-algorithm-coursework
    title: 数据结构算法实验
    status: ready
    majors: [cs]
    match_keywords: [数据结构, 算法, 链表, 二叉树, 图论, leetcode]
    skills_to_install:
      - name: ds-algorithm-lab
        scope: project
    workspace_subdir: ds-homework
    deliverables: [实现代码, 复杂度说明, 测试, 报告]

  - id: ml-coursework
    title: 机器学习课设
    status: ready
    majors: [cs, math, ee]
    match_keywords: [机器学习, jupyter, sklearn, pytorch, 课设, 数据分析, 深度学习]
    skills_to_install:
      - name: ml-notebook-lab
        scope: project
    workspace_subdir: ml-homework
    deliverables: [notebook, requirements.txt, 图表, 报告]

  - id: matlab-control-lab
    title: MATLAB / Simulink 仿真实验
    status: ready
    majors: [ee, auto, cs, mech, phys]
    match_keywords:
      - matlab
